<div class="auth-container">
  <div class="auth-card">
    <h1>NutriTrack</h1>
    <h2>Crear Cuenta</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-control"
          placeholder="tu@email.com"
          [class.is-invalid]="f['email'].invalid && f['email'].touched"
        />
        <div class="error-message" *ngIf="f['email'].invalid && f['email'].touched">
          <span *ngIf="f['email'].errors?.['required']">Email es requerido</span>
          <span *ngIf="f['email'].errors?.['email']">Email no válido</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="form-control"
          placeholder="Mínimo 6 caracteres"
          [class.is-invalid]="f['password'].invalid && f['password'].touched"
        />
        <div class="error-message" *ngIf="f['password'].invalid && f['password'].touched">
          <span *ngIf="f['password'].errors?.['required']">Contraseña es requerida</span>
          <span *ngIf="f['password'].errors?.['minlength']">Mínimo 6 caracteres</span>
        </div>
      </div>

      <div class="success-message" *ngIf="success">
        {{ success }}
      </div>

      <div class="error-message global" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
        {{ loading ? 'Registrando...' : 'Registrarse' }}
      </button>
    </form>

    <p class="auth-link">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
    </p>
  </div>
</div>
